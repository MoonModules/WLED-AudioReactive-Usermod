; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev
src_dir = .

[env]
; Common settings for all environments
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -I../
; Build source files from parent directory
build_src_filter =
    +<*>
    +<../agc_controller.cpp>
    +<../audio_filters.cpp>
    +<../audio_processor.cpp>
    -<../audio_reactive.cpp>
    -<../example_standalone.ino>

[env:esp32dev]
; ESP32 DevKit (classic ESP32)
platform = espressif32 @ ^6.5.0
board = esp32dev
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
lib_deps =
    https://github.com/kosme/arduinoFFT.git#v2.0.1

[env:esp32-s3]
; ESP32-S3 (recommended for best performance)
platform = espressif32 @ ^6.5.0
board = esp32-s3-devkitc-1
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    https://github.com/kosme/arduinoFFT.git#v2.0.1

[env:esp32-s2]
; ESP32-S2 (limited performance, no dual-core)
platform = espressif32 @ ^6.5.0
board = esp32-s2-saola-1
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    https://github.com/kosme/arduinoFFT.git#v2.0.1

[env:esp32-c3]
; ESP32-C3 (RISC-V, limited performance)
platform = espressif32 @ ^6.5.0
board = esp32-c3-devkitm-1
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    https://github.com/kosme/arduinoFFT.git#v2.0.1

; Development/debugging environments
[env:esp32dev-debug]
; ESP32 with debug enabled
extends = env:esp32dev
build_type = debug
build_flags =
    ${env.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DDEBUGSR_PRINT
    -DMIC_LOGGER
monitor_filters =
    esp32_exception_decoder
    log2file

[env:esp32dev-fast]
; ESP32 optimized for performance
extends = env:esp32dev
build_flags =
    ${env.build_flags}
    -O3
    -DWLEDMM_FASTPATH
    -DFFT_USE_SLIDING_WINDOW
board_build.f_cpu = 240000000L

